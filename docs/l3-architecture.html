<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chimp Chaos Operator — L3 System Architecture</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;padding:20px 24px}
  h1{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
  .sub{font-size:12px;color:#666;margin-bottom:16px}
  svg{display:block;width:100%;max-width:1050px;height:auto}
</style>
</head>
<body>
<h1>Chimp Chaos Operator — L3 System Architecture</h1>
<p class="sub">High-level system context: components, external systems, and interaction flows</p>

<svg viewBox="0 0 920 780">

</defs>

<!-- ═══════════════════════════════════════════════════ -->
<!-- CLUSTER BOUNDARY                                   -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="50" y="15" width="850" height="740" fill="none" stroke="#3b7ddd" stroke-width="2" stroke-dasharray="10 5" rx="12"/>
<text x="68" y="36" font-family="sans-serif" font-size="12" font-weight="700" fill="#3b7ddd">Kubernetes Cluster</text>

<!-- ═══════ ROW 0: USER ═══════ -->
<g transform="translate(380,65)">
  <circle cx="0" cy="-18" r="9" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="0" y1="-9" x2="0" y2="5" stroke="#333" stroke-width="1.5"/>
  <line x1="-11" y1="-3" x2="11" y2="-3" stroke="#333" stroke-width="1.5"/>

</g>

<!-- Arrow: User → K8s API -->
<line x1="380" y1="100" x2="380" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>
<text x="390" y="122" font-family="sans-serif" font-size="8" fill="#777">kubectl apply</text>

<!-- ═══════ ROW 1: K8s API + CRDs ═══════ -->

<g filter="url(#s)">

</g>

<!-- Arrow: CRDs ↔ K8s API -->
<line x1="260" y1="164" x2="303" y2="164" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Arrow: K8s API → Operator (watch) -->

<!-- Operator -->
<g filter="url(#s)">

  <text text-anchor="middle" x="380" y="254" font-family="sans-serif" font-size="12" font-weight="600" fill="#2563eb">Chimp Chaos Operator</text>
  <text text-anchor="middle" x="380" y="269" font-family="sans-serif" font-size="9" fill="#3b7ddd">(Deployment)</text>
</g>

<!-- Prometheus -->
<g filter="url(#s)" transform="translate(680,224)">
  <ellipse cx="55" cy="9" rx="52" ry="12" fill="#eef4ff" stroke="#3b7ddd" stroke-width="1.2"/>
  <rect x="3" y="9" width="104" height="34" fill="#eef4ff" stroke="#3b7ddd" stroke-width="1.2"/>
  <ellipse cx="55" cy="43" rx="52" ry="12" fill="#eef4ff" stroke="#3b7ddd" stroke-width="1.2"/>
  <ellipse cx="55" cy="9" rx="52" ry="12" fill="#dbeafe" stroke="#3b7ddd" stroke-width="1.2"/>
  <text text-anchor="middle" x="55" y="30" font-family="sans-serif" font-size="11" font-weight="600" fill="#2563eb">Prometheus</text>
</g>

<text x="555" y="250" font-family="sans-serif" font-size="8" fill="#777" text-anchor="middle">PromQL queries (graph + analysis)</text>

<!-- Arrow: Operator → K8s API (patch, up-left offset) -->
<path d="M 310,234 L 310,190 L 305,190" stroke="#aaa" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#ad)"/>
<text x="255" y="217" font-family="sans-serif" font-size="7.5" fill="#999">patch status</text>


<!-- ═══════ ROW 3: TWO PATHS ═══════ -->
<!-- Labels for the two paths -->
<text x="175" y="310" font-family="sans-serif" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Pod / Node Chaos</text>
<text x="555" y="310" font-family="sans-serif" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Edge Chaos</text>

<!-- Arrow: Operator → Runner Jobs (left path) -->
<line x1="330" y1="282" x2="220" y2="330" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>
<text x="260" y="298" font-family="sans-serif" font-size="8" fill="#777">creates Jobs</text>

<!-- Arrow: Operator → VirtualService (right path) -->
<line x1="430" y1="282" x2="510" y2="330" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>
<text x="475" y="298" font-family="sans-serif" font-size="8" fill="#777">creates VS</text>

  <text text-anchor="middle" x="175" y="364" font-family="sans-serif" font-size="8" fill="#666">--mode runner</text>
  <text text-anchor="middle" x="175" y="378" font-family="sans-serif" font-size="8" fill="#666">Node 1..N, :9090/metrics</text>
</g>

<!-- VirtualService -->
<g filter="url(#s)">
  <rect x="460" y="332" width="185" height="60" fill="#fff" stroke="#333" stroke-width="1.4" rx="6"/>
  <text text-anchor="middle" x="552" y="352" font-family="sans-serif" font-size="10" font-weight="600">VirtualService</text>
  <text text-anchor="middle" x="552" y="366" font-family="sans-serif" font-size="8" fill="#666">Istio Fault Policy</text>
  <text text-anchor="middle" x="552" y="380" font-family="sans-serif" font-size="8" fill="#666">sourceLabels + FQDN hosts</text>
</g>

<!-- Arrow: Runner → Prometheus (scrape, right) -->
<line x1="260" y1="350" x2="678" y2="270" stroke="#aaa" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#ad)"/>
<text x="500" y="318" font-family="sans-serif" font-size="7.5" fill="#999" text-anchor="end">scrape /metrics</text>


<!-- ═══════ ROW 4: INJECTION TARGETS ═══════ -->
<!-- Arrow: Runner → Target Pods -->
<line x1="175" y1="392" x2="175" y2="442" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>
<text x="185" y="422" font-family="sans-serif" font-size="8" fill="#777">inject chaos</text>

<!-- Arrow: VS → Istio CP -->
<line x1="552" y1="392" x2="552" y2="442" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>
<text x="562" y="422" font-family="sans-serif" font-size="8" fill="#777">push config</text>

<!-- Target Pods -->
<g filter="url(#s)">
  <rect x="90" y="444" width="170" height="50" fill="#fff" stroke="#333" stroke-width="1.4" rx="6"/>
  <text text-anchor="middle" x="175" y="464" font-family="sans-serif" font-size="10" font-weight="600">Target Pods</text>
  <text text-anchor="middle" x="175" y="480" font-family="sans-serif" font-size="8" fill="#666">kill / stress-ng / tc netem</text>
</g>

<!-- Istio CP -->
<g filter="url(#s)">
  <rect x="460" y="444" width="185" height="50" fill="#fff" stroke="#333" stroke-width="1.4" rx="6"/>
  <text text-anchor="middle" x="552" y="464" font-family="sans-serif" font-size="10" font-weight="600">Istio Control Plane</text>
  <text text-anchor="middle" x="552" y="480" font-family="sans-serif" font-size="8" fill="#666">istiod</text>
</g>


<!-- ═══════ ROW 5: TARGET WORKLOADS ═══════ -->
<!-- Arrow: Istio CP → Target Workloads -->
<line x1="552" y1="494" x2="552" y2="538" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Target Workloads boundary -->
<rect x="355" y="540" width="330" height="170" fill="none" stroke="#d4380d" stroke-width="1.8" stroke-dasharray="8 4" rx="10"/>
<text x="375" y="558" font-family="sans-serif" font-size="10" font-weight="700" fill="#d4380d">Target Workload (blast radius)</text>

<!-- Source → Sidecar → Dest -->
<g filter="url(#s)">
  <rect x="380" y="572" width="120" height="38" fill="#fff" stroke="#333" stroke-width="1.2" rx="5"/>
  <text text-anchor="middle" x="440" y="588" font-family="sans-serif" font-size="9" font-weight="600">Source Service</text>
  <text text-anchor="middle" x="440" y="601" font-family="sans-serif" font-size="7.5" fill="#666">(e.g. payment)</text>
</g>

<line x1="500" y1="591" x2="528" y2="591" stroke="#555" stroke-width="1" marker-end="url(#a)"/>

<g filter="url(#s)">
  <rect x="530" y="572" width="120" height="38" fill="#fff" stroke="#333" stroke-width="1.2" rx="5"/>
  <text text-anchor="middle" x="590" y="588" font-family="sans-serif" font-size="9" font-weight="600">Istio Sidecar</text>
  <text text-anchor="middle" x="590" y="601" font-family="sans-serif" font-size="7.5" fill="#666">Envoy Proxy</text>
</g>

<line x1="590" y1="610" x2="590" y2="638" stroke="#555" stroke-width="1" marker-end="url(#a)"/>

<g filter="url(#s)">
  <rect x="455" y="640" width="120" height="38" fill="#fff" stroke="#333" stroke-width="1.2" rx="5"/>
  <text text-anchor="middle" x="515" y="656" font-family="sans-serif" font-size="9" font-weight="600">Dest Service</text>
  <text text-anchor="middle" x="515" y="669" font-family="sans-serif" font-size="7.5" fill="#666">(e.g. ledger)</text>
</g>

<!-- Arrow: Targets → Prometheus (telemetry) -->
<path d="M 650,600 Q 750,500 745,280" stroke="#aaa" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#ad)"/>
<text x="758" y="440" font-family="sans-serif" font-size="7.5" fill="#999">scrape Istio</text>
<text x="758" y="450" font-family="sans-serif" font-size="7.5" fill="#999">telemetry</text>


<!-- ═══════ LEGEND ═══════ -->
<g transform="translate(90,545)">
  <rect x="0" y="0" width="210" height="55" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="5"/>
  <text x="10" y="14" font-family="sans-serif" font-size="9" font-weight="700" fill="#333">CHAOS INJECTION PATHS</text>
  <text x="10" y="28" font-family="sans-serif" font-size="8" fill="#555">1. Pod/Node → Runner Job → target pod</text>
  <text x="10" y="39" font-family="sans-serif" font-size="8" fill="#555">2. Edge → VirtualService → Istio sidecar</text>
  <text x="10" y="51" font-family="sans-serif" font-size="7" fill="#999">Operator monitors via K8s API, NOT Prometheus</text>
</g>

<g transform="translate(90,615)">
  <rect x="0" y="0" width="210" height="105" fill="#fafbfc" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="10" y="14" font-family="sans-serif" font-size="9" font-weight="700" fill="#333">LEGEND</text>
  <rect x="10" y="24" width="22" height="11" fill="#eef4ff" stroke="#3b7ddd" stroke-width="1" rx="3"/>

  <rect x="10" y="41" width="22" height="11" fill="#fff" stroke="#333" stroke-width="1" rx="3"/>
  <text x="38" y="50" font-family="sans-serif" font-size="8" fill="#555">Kubernetes / Infra</text>
  <rect x="10" y="58" width="22" height="11" fill="#f9fafb" stroke="#666" stroke-width="1" stroke-dasharray="4 2" rx="3"/>
  <text x="38" y="67" font-family="sans-serif" font-size="8" fill="#555">Ephemeral Runner Job</text>
  <line x1="10" y1="80" x2="32" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="38" y="84" font-family="sans-serif" font-size="8" fill="#555">Control / Data flow</text>
  <line x1="10" y1="94" x2="32" y2="94" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ad)"/>
  <text x="38" y="98" font-family="sans-serif" font-size="8" fill="#555">Scrape / query</text>
</g>

</svg>
